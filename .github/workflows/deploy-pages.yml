name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Validate and build static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate data
        run: node scripts/validate.js

      - name: Check validation script syntax
        run: node --check scripts/validate.js

      - name: Check slugify script syntax
        run: node --check scripts/slugify.js

      - name: Parse web lockfile
        run: node -e "const fs=require('fs'); JSON.parse(fs.readFileSync('web/package-lock.json','utf8'));"

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Lint web if available
        working-directory: web
        run: npm run lint --if-present

      - name: Test web if available
        working-directory: web
        run: npm run test --if-present

      - name: Build web
        working-directory: web
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
